{% extends "facilitystaff/base_facilitystaff.html" %}
{% block title %}Court Schedule{% endblock %}
{% block content %}
<div class="dashboard-header">
    <h1 class="page-title">Today's Schedule</h1>
    <div class="header-actions">
        <input type="date" class="form-input" style="padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); border-radius: 8px;">
    </div>
</div>
<div class="glass-card" style="min-height: 400px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <i class="ph ph-calendar-blank" style="font-size: 4rem; color: var(--text-secondary); margin-bottom: 20px;"></i>
    <p style="color: var(--text-secondary);">Interactive court timeline will be rendered here.</p>
</div>
{% endblock %}
