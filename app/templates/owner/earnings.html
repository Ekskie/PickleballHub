{% extends "owner/base_owner.html" %}
{% block title %}Earnings{% endblock %}
{% block content %}
<div class="dashboard-header">
    <h1 class="page-title">Financial Earnings</h1>
    <button class="action-box green" style="width: auto; padding: 0.5rem 1rem;">
        <i class="ph ph-download-simple"></i> Export Report
    </button>
</div>
<div class="dashboard-grid">
    <div class="dashboard-main" style="width: 100%;">
        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px;">
            <div class="glass-card stat-box" style="padding: 1.5rem;">
                <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin: 0;">Total Revenue (MTD)</h3>
                <p class="stat-value" style="font-size: 2rem; font-weight: 700; margin: 10px 0; color: var(--text-primary);">$12,450</p>
                <span class="stat-change positive" style="font-size: 0.8rem; font-weight: 600; color: #4ade80;"><i class="ph ph-trend-up"></i> +8.5%</span>
            </div>
            <div class="glass-card stat-box" style="padding: 1.5rem;">
                <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin: 0;">Court Bookings</h3>
                <p class="stat-value" style="font-size: 2rem; font-weight: 700; margin: 10px 0; color: var(--text-primary);">312</p>
            </div>
            <div class="glass-card stat-box" style="padding: 1.5rem;">
                <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin: 0;">Pending Payout</h3>
                <p class="stat-value" style="font-size: 2rem; font-weight: 700; margin: 10px 0; color: var(--text-primary);">$4,200</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
