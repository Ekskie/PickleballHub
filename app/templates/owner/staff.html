{% extends "owner/base_owner.html" %}
{% block title %}Staff Management{% endblock %}
{% block content %}
<div class="dashboard-header">
    <h1 class="page-title">Staff Management</h1>
    <button class="action-box orange" style="width: auto; padding: 0.5rem 1rem;">
        <i class="ph ph-user-plus"></i> Add Staff
    </button>
</div>
<div class="glass-card">
    <div class="table-container">
        <table class="data-grid">
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>ROLE</th>
                    <th>ASSIGNED FACILITY</th>
                    <th>STATUS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="bold">Michael Scott</td>
                    <td>Facility Manager</td>
                    <td>Oasis Pickleball Club</td>
                    <td><span class="status-pill success">Active</span></td>
                    <td><a href="#" class="action-link" style="color:#ef4444;">Remove</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
