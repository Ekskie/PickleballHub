<!-- Dynamic Platform SEO & Meta Configurations -->
<meta name="description" content="{% block seo_description %}{{ platform_settings.seo_meta_description }}{% endblock %}">
<meta name="keywords" content="{% block seo_keywords %}{{ platform_settings.seo_meta_keywords }}{% endblock %}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% block og_title %}{% endblock %}{% if self.og_title() %}{% else %}{{ platform_settings.seo_meta_title }}{% endif %}">
<meta property="og:description" content="{% block og_description %}{{ platform_settings.seo_meta_description }}{% endblock %}">
<meta property="og:image" content="{{ platform_settings.seo_og_image or url_for('static', filename='images/logo.png', _external=True) }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% block twitter_title %}{% endblock %}{% if self.twitter_title() %}{% else %}{{ platform_settings.seo_meta_title }}{% endif %}">
<meta name="twitter:description" content="{% block twitter_description %}{{ platform_settings.seo_meta_description }}{% endblock %}">
<meta name="twitter:image" content="{{ platform_settings.seo_og_image or url_for('static', filename='images/logo.png', _external=True) }}">

<!-- Google Analytics (gtag.js) -->
{% if platform_settings.google_analytics_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ platform_settings.google_analytics_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ platform_settings.google_analytics_id }}');
</script>
{% endif %}

<!-- Facebook Pixel Code -->
{% if platform_settings.facebook_pixel_id %}
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '{{ platform_settings.facebook_pixel_id }}');
  fbq('track', 'PageView');
</script>
<noscript>
  <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id={{ platform_settings.facebook_pixel_id }}&ev=PageView&noscript=1"/>
</noscript>
{% endif %}

<!-- Custom Head Scripts from Superadmin -->
{% if platform_settings.custom_head_scripts %}
{{ platform_settings.custom_head_scripts | safe }}
{% endif %}
