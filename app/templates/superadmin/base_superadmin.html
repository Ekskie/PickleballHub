{% extends "base.html" %}

{% block extra_head %}
<style>
    /* ── SUPERADMIN PLATFORM-WIDE STYLE OVERRIDES ── */
    :root {
        --primary-orange: #ff5722;
        --primary-orange-hover: #f4511e;
        /* Light mode values (default) */
        --card-bg-elevated: rgba(255, 255, 255, 0.85);
        --border-color-soft: rgba(0, 0, 0, 0.06);
        --dropdown-bg: rgba(255, 255, 255, 0.98);
        --dropdown-border: rgba(0, 0, 0, 0.08);
        --stat-icon-bg: rgba(0, 0, 0, 0.03);
        --stat-icon-border: rgba(0, 0, 0, 0.06);
        --action-box-bg: rgba(0, 0, 0, 0.02);
        --modal-box-bg: rgba(255, 255, 255, 0.98);
        --modal-box-border: rgba(0, 0, 0, 0.1);
        --text-card-muted: #6a7181;
        --table-bg: #ffffff;
        --table-header-bg: rgba(0, 0, 0, 0.02);
        --table-border-color: rgba(0, 0, 0, 0.06);
        --table-row-hover: rgba(255, 87, 34, 0.04);
    }

    html.dark-mode {
        /* Dark mode overrides */
        --card-bg-elevated: rgba(22, 25, 33, 0.7);
        --border-color-soft: rgba(255, 255, 255, 0.08);
        --dropdown-bg: rgba(18, 22, 29, 0.98);
        --dropdown-border: rgba(255, 255, 255, 0.1);
        --stat-icon-bg: rgba(255, 255, 255, 0.04);
        --stat-icon-border: rgba(255, 255, 255, 0.08);
        --action-box-bg: rgba(255, 255, 255, 0.03);
        --modal-box-bg: rgba(22, 25, 33, 0.98);
        --modal-box-border: rgba(255, 255, 255, 0.1);
        --text-card-muted: #64748B;
        --table-bg: rgba(22, 25, 33, 0.6);
        --table-header-bg: rgba(255, 255, 255, 0.03);
        --table-border-color: rgba(255, 255, 255, 0.08);
        --table-row-hover: rgba(255, 87, 34, 0.06);
    }

    /* Elevated Glassmorphic Card animations */
    .glass-card {
        background: var(--card-bg-elevated) !important;
        border: 1px solid var(--border-color-soft) !important;
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        transition: transform 0.25s cubic-bezier(0.165, 0.84, 0.44, 1), 
                    box-shadow 0.25s cubic-bezier(0.165, 0.84, 0.44, 1), 
                    border-color 0.25s ease;
        border-radius: 16px !important;
        box-shadow: var(--shadow-card) !important;
        overflow: visible; /* Support dropdown menus */
        color: var(--text-primary);
    }

    .glass-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-hover) !important;
        border-color: rgba(255, 87, 34, 0.22) !important;
    }

    /* Premium Data Grid (Tables) Overhaul */
    .table-container {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-color-soft);
        background: var(--table-bg);
    }

    .data-grid {
        border-collapse: collapse !important;
        width: 100%;
        background: transparent;
    }

    .data-grid th {
        background: var(--table-header-bg) !important;
        color: var(--text-primary) !important;
        font-size: 0.8rem !important;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        font-weight: 700 !important;
        padding: 14px 18px !important;
        border-bottom: 2px solid var(--table-border-color) !important;
        text-align: left;
    }

    .data-grid td {
        padding: 14px 18px !important;
        border-bottom: 1px solid var(--table-border-color) !important;
        font-size: 0.9rem;
        color: var(--text-secondary);
        transition: background 0.2s ease;
        vertical-align: middle;
    }

    .data-grid tbody tr {
        background: transparent;
    }

    .data-grid tbody tr:hover td {
        background: var(--table-row-hover) !important;
        color: var(--text-primary);
    }

    /* Re-styled Pill Badges */
    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 30px;
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-transform: uppercase;
    }

    .status-pill.success {
        background: rgba(16, 185, 129, 0.08) !important;
        border: 1px solid rgba(16, 185, 129, 0.25) !important;
        color: #10b981 !important;
    }

    .status-pill.warning {
        background: rgba(245, 158, 11, 0.08) !important;
        border: 1px solid rgba(245, 158, 11, 0.25) !important;
        color: #f59e0b !important;
    }

    .status-pill.error, .status-pill.danger {
        background: rgba(239, 68, 68, 0.08) !important;
        border: 1px solid rgba(239, 68, 68, 0.25) !important;
        color: #ef4444 !important;
    }

    .status-pill.info {
        background: rgba(99, 102, 241, 0.08) !important;
        border: 1px solid rgba(99, 102, 241, 0.25) !important;
        color: #818cf8 !important;
    }

    /* Actions dropdown container styling */
    .actions-dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-trigger {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-primary);
        border: 1px solid var(--border-color-soft);
        padding: 6px 12px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        transition: all 0.2s ease;
    }

    .dropdown-trigger:hover {
        background: rgba(255, 87, 34, 0.1);
        border-color: rgba(255, 87, 34, 0.25);
        color: var(--primary-orange);
    }

    .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 5px);
        background: var(--dropdown-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--dropdown-border);
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        min-width: 140px;
        z-index: 999;
        overflow: hidden;
        animation: dropDownShow 0.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    @keyframes dropDownShow {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        padding: 10px 14px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .dropdown-item:hover {
        background: rgba(255, 87, 34, 0.12);
        color: var(--primary-orange);
    }

    .dropdown-item.danger:hover {
        background: rgba(239, 68, 68, 0.12);
        color: #ef4444;
    }

    /* Sidebar micro-animations */
    .sidebar-nav li a {
        transition: all 0.25s ease;
    }

    .sidebar-nav li.active a i {
        color: var(--primary-orange) !important;
        animation: navIconPulse 1.2s ease infinite alternate;
    }

    @keyframes navIconPulse {
        from { transform: scale(1); }
        to { transform: scale(1.15); }
    }
</style>
{% block superadmin_extra_head %}{% endblock %}
{% endblock %}
