{% extends "clubadmin/base_clubadmin.html" %}

{% block title %}Club Setup{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1 class="page-title">Club Setup</h1>
</div>

<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('clubadmin.club_setup') }}" enctype="multipart/form-data">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="name" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Club Name <span style="color: red;">*</span></label>
            <input type="text" id="name" name="name" value="{{ g.club.name if g.club else '' }}" required
                   style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="description" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Description</label>
            <textarea id="description" name="description" rows="4"
                      style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">{{ g.club.description if g.club else '' }}</textarea>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="location" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Location (e.g., City, State or Primary Facility)</label>
            <input type="text" id="location" name="location" value="{{ g.club.location if g.club else '' }}"
                   style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="logo" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Club Logo</label>
            {% if g.club and g.club.logo_url %}
            <div style="margin-bottom: 10px;">
                <img src="{{ g.club.logo_url }}" alt="Club Logo" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            </div>
            {% endif %}
            <input type="file" id="logo" name="logo" accept="image/*"
                   style="width: 100%; padding: 10px; border: 1px dashed var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
            <div class="form-group">
                <label for="membership_type" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Membership Type</label>
                <select id="membership_type" name="membership_type" onchange="toggleFeeInput()"
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">
                    <option value="free" {% if not g.club or g.club.membership_type == 'free' %}selected{% endif %}>Free to Join</option>
                    <option value="paid" {% if g.club and g.club.membership_type == 'paid' %}selected{% endif %}>Paid Membership</option>
                </select>
            </div>
            
            <div class="form-group" id="fee_group" style="display: {% if g.club and g.club.membership_type == 'paid' %}block{% else %}none{% endif %};">
                <label for="membership_fee" style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600;">Membership Fee (₱)</label>
                <input type="number" id="membership_fee" name="membership_fee" min="0" step="0.01" value="{{ g.club.membership_fee if g.club else 0 }}"
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-primary);">
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px;">
            {% if g.club %}
            <a href="{{ url_for('clubadmin.dashboard') }}" class="btn-cancel" style="padding: 12px 24px; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); text-decoration: none;">Cancel</a>
            {% endif %}
            <button type="submit" class="action-box orange" style="padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                {% if g.club %}Save Changes{% else %}Create Club{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
function toggleFeeInput() {
    const type = document.getElementById('membership_type').value;
    document.getElementById('fee_group').style.display = type === 'paid' ? 'block' : 'none';
}
</script>
{% endblock %}
