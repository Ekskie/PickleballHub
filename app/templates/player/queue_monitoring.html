{% extends "player/base_player.html" %}

{% block title %}Queue Monitoring{% endblock %}

{% block extra_head %}
<style>
    .queue-position-card {
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 28px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        box-shadow: var(--shadow-card);
        margin-bottom: 24px;
    }
    .queue-circle {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: var(--primary-orange-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--primary-orange);
        flex-shrink: 0;
    }
    .queue-details h2 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 4px;
    }
    .queue-details p {
        font-size: 0.875rem;
        color: var(--text-secondary);
        margin: 0;
        line-height: 1.6;
    }

    /* Queue table */
    .queue-table-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
    }
    .queue-table-header i {
        color: var(--primary-orange);
        font-size: 1.2rem;
    }
    .queue-table-header h3 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
    }
    .queue-table {
        width: 100%;
        border-collapse: collapse;
    }
    .queue-table th {
        text-align: left;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-muted);
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .queue-table td {
        padding: 16px 0;
        font-size: 0.875rem;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border-color);
    }
    .queue-table tr:last-child td {
        border-bottom: none;
    }
    .queue-table td:first-child {
        font-weight: 700;
        color: var(--text-primary);
        width: 40px;
    }
    .queue-table td.player-name {
        font-weight: 600;
        color: var(--text-primary);
    }
    .queue-table td.court-mono {
        font-family: monospace;
        font-size: 0.85rem;
    }
    .queue-row-you {
        background: var(--primary-orange-light);
    }
    .queue-row-you td {
        color: var(--text-primary) !important;
    }
    .you-label {
        color: var(--primary-orange);
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 6px;
    }

    /* Status pills */
    .pill-next {
        display: inline-block;
        background: var(--btn-green-light);
        color: var(--btn-green);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
    }
    .pill-waiting {
        display: inline-block;
        background: rgba(225, 86, 35, 0.1);
        color: var(--primary-orange);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
    }
    html.dark-mode .pill-next {
        background: rgba(41, 163, 86, 0.15);
        color: #4ade80;
    }
    html.dark-mode .pill-waiting {
        background: rgba(225, 86, 35, 0.15);
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1 class="page-title">Queue Monitoring</h1>
</div>

<div id="queue-container">
    {% include 'player/partials/queue_content.html' %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- 1. Client-side Realtime Countdown ---
        function updateWaitTimes() {
            const displays = document.querySelectorAll('.wait-time-display');
            displays.forEach(el => {
                const targetTimeStr = el.getAttribute('data-target-time');
                const timeType = el.getAttribute('data-time-type');
                
                if (targetTimeStr) {
                    const targetTime = new Date(targetTimeStr + (targetTimeStr.includes('Z') || targetTimeStr.includes('+') ? '' : 'Z'));
                    const now = new Date();
                    
                    let diffMs = 0;
                    if (timeType === 'Wait') {
                        diffMs = targetTime - now;
                    } else if (timeType === 'Remaining') {
                        diffMs = targetTime - now;
                    }
                    
                    let diffMins = Math.floor(diffMs / 60000);
                    if (diffMins < 0) diffMins = 0;
                    
                    if (timeType === 'Remaining') {
                        el.innerText = `${diffMins} min left`;
                    } else {
                        el.innerText = `~${diffMins} min`;
                    }
                }
            });
        }

        // Run immediately and every 1 minute
        updateWaitTimes();
        setInterval(updateWaitTimes, 60000);

        // --- 2. Supabase Realtime Subscription ---
        if (typeof supabaseClient !== 'undefined' && supabaseClient) {
            const queueChannel = supabaseClient.channel('custom-all-channel')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'court_queues' },
                    (payload) => {
                        console.log('Queue change received!', payload);
                        // Fetch the updated queue partial HTML
                        fetch("{{ url_for('player.queue_partial') }}")
                            .then(response => response.text())
                            .then(html => {
                                document.getElementById('queue-container').innerHTML = html;
                                // Re-run the wait time calculation for the new DOM elements
                                updateWaitTimes();
                            })
                            .catch(error => console.error('Error fetching updated queue:', error));
                    }
                )
                .subscribe();
                
            // Optional: cleanup on page leave
            window.addEventListener("beforeunload", () => {
                supabaseClient.removeChannel(queueChannel);
            });
        }
    });
</script>
{% endblock %}
