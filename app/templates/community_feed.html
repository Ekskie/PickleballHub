{# community_feed.html — Shared community macro included by all role templates #}
{% macro render_community() %}

<!-- ── Page Header ───────────────────────────────── -->
<div class="community-page-header">
    <div class="community-header-left">
        <h1 class="page-title"><i class="ph ph-users-three"></i> Community Feed</h1>
        <span class="posts-count" id="posts-count-label">Loading...</span>
    </div>
    <div class="community-header-right">
        <button class="community-refresh-btn" id="btn-refresh-feed" title="Refresh feed">
            <i class="ph ph-arrow-clockwise"></i> Refresh
        </button>
    </div>
</div>

<!-- ── Smart Feed Banner (shown when displaying unviewed post) ── -->
<div class="smart-feed-banner" id="smart-feed-banner" style="display:none;">
    <i class="ph ph-sparkle"></i>
    <span id="smart-feed-message">Here's something you haven't seen yet!</span>
    <button class="smart-feed-close" id="btn-close-banner">
        <i class="ph ph-x"></i>
    </button>
</div>

<!-- ── Create Post Card ──────────────────────────── -->
<div class="create-post-card">
    <div class="create-post-top">
        <div class="community-avatar" id="current-user-avatar">?</div>
        <div class="post-compose-area">
            <textarea id="post-textarea" class="post-textarea" placeholder="What's on your mind? Share with the community..." rows="3"></textarea>
            <!-- Image Preview -->
            <div class="post-image-preview-wrap" id="post-image-preview-wrap" style="display:none;">
                <img id="post-image-preview" src="" alt="Preview" class="post-image-preview" />
                <button class="post-image-remove" id="btn-remove-image" title="Remove image">
                    <i class="ph ph-x-circle"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="create-post-footer">
        <div class="create-post-actions">
            <label for="post-image-input" class="post-action-btn" title="Add photo">
                <i class="ph ph-image"></i>
                <span>Photo</span>
                <input type="file" id="post-image-input" accept="image/*" style="display:none;" />
            </label>
        </div>
        <button id="btn-post" class="btn-post">
            <i class="ph ph-paper-plane-tilt"></i> Post
        </button>
    </div>
</div>

<!-- ── Dynamic Posts Feed ────────────────────────── -->
<div id="community-feed-wrapper">
    <!-- Skeleton loader -->
    <div class="feed-skeleton">
        <div class="skeleton-card">
            <div class="sk-avatar"></div>
            <div class="sk-lines">
                <div class="sk-line sk-line-short"></div>
                <div class="sk-line"></div>
                <div class="sk-line sk-line-medium"></div>
            </div>
        </div>
        <div class="skeleton-card">
            <div class="sk-avatar"></div>
            <div class="sk-lines">
                <div class="sk-line sk-line-short"></div>
                <div class="sk-line"></div>
            </div>
        </div>
        <div class="skeleton-card">
            <div class="sk-avatar"></div>
            <div class="sk-lines">
                <div class="sk-line sk-line-short"></div>
                <div class="sk-line sk-line-medium"></div>
            </div>
        </div>
    </div>
</div>

<!-- ── Share Modal ────────────────────────────────── -->
<div class="share-modal-overlay" id="share-modal-overlay" style="display:none;">
    <div class="share-modal">
        <div class="share-modal-header">
            <h3><i class="ph ph-share-network"></i> Share Post</h3>
            <button class="share-modal-close" id="btn-close-share">
                <i class="ph ph-x"></i>
            </button>
        </div>
        <div class="share-post-preview" id="share-post-preview"></div>
        <div class="share-options">
            <button class="share-option-btn" id="share-copy-link">
                <i class="ph ph-link"></i>
                <span>Copy Link</span>
            </button>
            <button class="share-option-btn share-twitter" id="share-twitter">
                <i class="ph ph-x-logo"></i>
                <span>X / Twitter</span>
            </button>
            <button class="share-option-btn share-facebook" id="share-facebook">
                <i class="ph ph-facebook-logo"></i>
                <span>Facebook</span>
            </button>
            <button class="share-option-btn share-copy-text" id="share-copy-text">
                <i class="ph ph-clipboard-text"></i>
                <span>Copy Text</span>
            </button>
        </div>
        <div class="share-copied-toast" id="share-copied-toast" style="display:none;">
            <i class="ph ph-check-circle"></i> Copied!
        </div>
    </div>
</div>

{% endmacro %}
